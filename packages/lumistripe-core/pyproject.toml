[project]
name = "lumistripe-core"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
license = "MIT"
authors = [
    { name = "Felix Sternberg", email = "felix@sternberg.cx" }
]
requires-python = ">=3.12"
dependencies = [
    "typing-extensions>=4.16",
    "numpy>=2.5",
]

[project.optional-dependencies]
audio = [
    "sounddevice>=0.5",
]
gpio = [
    "gpiod>=2.5",
]

[build-system]
requires = ["uv_build>=0.11.26,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "lumistripe"
