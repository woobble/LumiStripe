[project]
name = "lumistripe-core"
version = "0.1.0"
description = "LED stripe animation engine with audio-reactive effects and GPIO output"
readme = "README.md"
license = "MIT"
authors = [
    { name = "Felix Sternberg", email = "felix@sternberg.cx" }
]
requires-python = ">=3.12"
dependencies = [
    "typing-extensions>=4.16",
    "numpy>=2.5.1",
]

[project.optional-dependencies]
audio = [
    "sounddevice>=0.5",
]
gpio = [
    "gpiod>=2.5",
]

[build-system]
requires = ["setuptools>=83.0.0", "numpy>=2.5.1"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
lumistripe = ["*.pyi"]
"lumistripe.audio" = ["*.pyi"]
"lumistripe.gpio" = ["*.pyi"]
